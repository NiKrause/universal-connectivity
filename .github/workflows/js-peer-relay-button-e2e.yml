name: js-peer relay-button E2E

on:
  workflow_run:
    workflows:
      - Build uc-go-peer rootfs
    types:
      - completed
    branches:
      - main
  workflow_dispatch:
    inputs:
      rootfs_manifest_url:
        description: Rootfs manifest URL to validate and deploy
        required: false
        default: https://connect.nicokrause.com/rootfs/uc-go-peer/latest.json
      cleanup_instance_hashes:
        description: Comma-separated Aleph instance hashes to erase and forget before the test
        required: false
        default: ""
      testkit_ref:
        description: relay-button ref containing the @le-space/playwright source pilot
        required: false
        default: main

permissions:
  contents: read

concurrency:
  group: js-peer-relay-button-e2e
  cancel-in-progress: false

jobs:
  relay-chat:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 50
    defaults:
      run:
        working-directory: js-peer
    env:
      RELAY_BUTTON_E2E_PRIVATE_KEY: ${{ secrets.RELAY_BUTTON_E2E_PRIVATE_KEY != '' && secrets.RELAY_BUTTON_E2E_PRIVATE_KEY || secrets.ALEPH_PRIVATE_KEY }}
      RELAY_BUTTON_E2E_SSH_PUBLIC_KEY: ${{ secrets.RELAY_BUTTON_E2E_SSH_PUBLIC_KEY != '' && secrets.RELAY_BUTTON_E2E_SSH_PUBLIC_KEY || secrets.VM_SSH_PUBLIC_KEY }}
      RELAY_BUTTON_E2E_ROOTFS_MANIFEST_URL: ${{ inputs.rootfs_manifest_url != '' && inputs.rootfs_manifest_url || 'https://connect.nicokrause.com/rootfs/uc-go-peer/latest.json' }}
      RELAY_BUTTON_E2E_CLEANUP_INSTANCE_HASHES: ${{ inputs.cleanup_instance_hashes || '' }}
      RELAY_BUTTON_TESTKIT_MODULE: ${{ github.workspace }}/.relay-button-testkit/packages/playwright/dist/index.js

    steps:
      - uses: actions/checkout@v6

      - name: Checkout shared Relay Button test kit
        uses: actions/checkout@v6
        with:
          repository: NiKrause/relay-button
          ref: ${{ inputs.testkit_ref != '' && inputs.testkit_ref || 'main' }}
          path: .relay-button-testkit

      - uses: pnpm/action-setup@v6
        with:
          version: 10.33.0

      - uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: npm
          cache-dependency-path: js-peer/package-lock.json

      - run: npm ci
      - run: npx playwright install --with-deps chromium

      - name: Build shared Playwright test kit from source
        working-directory: ${{ github.workspace }}
        run: |
          pnpm --dir .relay-button-testkit install --frozen-lockfile --prefer-offline --filter @le-space/playwright...
          pnpm --dir .relay-button-testkit --filter @le-space/playwright build:publish

      - name: Verify E2E credentials
        run: |
          test -n "$RELAY_BUTTON_E2E_PRIVATE_KEY" || { echo 'A relay-button or Aleph private key secret is required.' >&2; exit 1; }
          test -n "$RELAY_BUTTON_E2E_SSH_PUBLIC_KEY" || { echo 'A relay-button or VM SSH public key secret is required.' >&2; exit 1; }

      - name: Provision uc-go-peer and exchange chat messages in two browsers
        run: npm run test:e2e:relay-button

      - name: Upload Playwright evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: js-peer-relay-button-e2e-${{ github.run_id }}
          if-no-files-found: warn
          retention-days: 7
          path: |
            js-peer/test-results/
            js-peer/playwright-report/

      - name: Summarize relay-button E2E
        if: always()
        run: node scripts/summarize-relay-button-e2e.mjs
