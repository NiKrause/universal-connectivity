name: js-peer build

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pull-requests: write
  statuses: write

on:
  push:
    paths:
      - 'js-peer/**'
      - '.github/workflows/js-peer.yml'
  pull_request:
    branches: [main]
    paths:
      - 'js-peer/**'
      - '.github/workflows/js-peer.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      ALEPH_PRIVATE_KEY: ${{ secrets.ALEPH_PRIVATE_KEY }}
      NEXT_PUBLIC_ALEPH_DOMAIN: ${{ vars.NEXT_PUBLIC_ALEPH_DOMAIN != '' && vars.NEXT_PUBLIC_ALEPH_DOMAIN || vars.ALEPH_DOMAIN }}
      NEXT_PUBLIC_VM_SSH_PUBLIC_KEY: ${{ vars.NEXT_PUBLIC_VM_SSH_PUBLIC_KEY != '' && vars.NEXT_PUBLIC_VM_SSH_PUBLIC_KEY || secrets.VM_SSH_PUBLIC_KEY }}
    defaults:
      run:
        working-directory: js-peer
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24.x'
      - run: npm ci
      - name: Resolve tested JS-peer bootstrap addresses
        run: npm run bootstrap:resolve
      - run: npm run lint
      - run: npm run build
      - name: Deploy preview through shared @le-space site publisher
        id: deploy
        if: github.event_name == 'pull_request'
        uses: NiKrause/relay-button/.github/actions/aleph-site-publish@9172bc8b924e10b5f7bd5b91cde5943ac8ace531
        with:
          directory: js-peer/out
          project_dir: ${{ github.workspace }}
          aleph_private_key: ${{ env.ALEPH_PRIVATE_KEY }}
          site_ref: universal-connectivity-pr-${{ github.event.pull_request.number }}
          retention_keep_count: '1'
      - name: Summarize Aleph preview deployment
        if: github.event_name == 'pull_request'
        env:
          ACTION_URL: ${{ steps.deploy.outputs.url }}
          ACTION_CID: ${{ steps.deploy.outputs.ipfs_cid }}
          ACTION_ITEM_HASH: ${{ steps.deploy.outputs.item_hash }}
          ACTION_STORE_STATUS: ${{ steps.deploy.outputs.store_status }}
          ACTION_API_HOST: ${{ steps.deploy.outputs.aleph_api_host }}
        run: |
          {
            echo '## Aleph Preview Deployment'
            echo
            if [[ -n "${ACTION_URL:-}" ]]; then
              echo "- URL: ${ACTION_URL}"
            fi
            if [[ -n "${ACTION_CID:-}" ]]; then
              echo "- CID: ${ACTION_CID}"
            fi
            if [[ -n "${ACTION_ITEM_HASH:-}" ]]; then
              echo "- STORE item hash: \`${ACTION_ITEM_HASH}\`"
            fi
            if [[ -n "${ACTION_STORE_STATUS:-}" ]]; then
              echo "- STORE status: \`${ACTION_STORE_STATUS}\`"
            fi
            if [[ -n "${ACTION_API_HOST:-}" ]]; then
              echo "- Aleph API host: \`${ACTION_API_HOST}\`"
            fi
            if [[ -z "${ACTION_URL:-}${ACTION_CID:-}${ACTION_ITEM_HASH:-}" ]]; then
              echo '- Preview deployment finished, but no URL/CID output was exposed by the action.'
            fi
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Summarize production ownership
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          {
            echo '## Production Publish Ownership'
            echo
            echo '- The custom domain is intentionally managed by `build-aleph-go-peer-rootfs.yml`.'
            echo '- This `js-peer` workflow only verifies the browser app build on `main` so it does not overwrite `/rootfs/uc-go-peer/latest.json`.'
          } >> "$GITHUB_STEP_SUMMARY"
