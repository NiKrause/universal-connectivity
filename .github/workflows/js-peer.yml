name: js-peer build

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

on:
  push:
    branches: [main]
    paths:
      - 'js-peer/**'
      - '.github/workflows/js-peer.yml'
  pull_request:
    branches: [main]
    paths:
      - 'js-peer/**'
      - '.github/workflows/js-peer.yml'

concurrency:
  group: js-peer-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: js-peer
    steps:
      - uses: actions/checkout@v6
      - uses: actions/configure-pages@v5
        id: pages
      - uses: actions/setup-node@v6
        with:
          node-version: '24.x'
      - run: npm ci
      - run: npm run lint
      - name: Build static js-peer site
        env:
          GITHUB_PAGES: 'true'
          PAGES_BASE_PATH: ${{ steps.pages.outputs.base_path }}
        run: npm run build
      - name: Upload GitHub Pages artifact
        if: github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: js-peer/out
      - name: Summarize GitHub Pages build
        run: |
          {
            echo '## GitHub Pages Build'
            echo
            echo "- Pages base path: \`${{ steps.pages.outputs.base_path }}\`"
            if [[ "${{ github.event_name }}" == "push" ]]; then
              echo '- Deployment target: GitHub Pages'
            else
              echo '- Pull requests build the static site but do not deploy it.'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  deploy:
    if: github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
