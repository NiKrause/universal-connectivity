name: js-peer build

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pull-requests: write
  statuses: write

on:
  push:
    paths:
      - 'js-peer/**'
      - '.github/workflows/js-peer.yml'
  pull_request:
    branches: [main]
    paths:
      - 'js-peer/**'
      - '.github/workflows/js-peer.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      ALEPH_PRIVATE_KEY: ${{ secrets.ALEPH_PRIVATE_KEY }}
      NEXT_PUBLIC_VM_SSH_PUBLIC_KEY: ${{ vars.NEXT_PUBLIC_VM_SSH_PUBLIC_KEY != '' && vars.NEXT_PUBLIC_VM_SSH_PUBLIC_KEY || secrets.VM_SSH_PUBLIC_KEY }}
    defaults:
      run:
        working-directory: js-peer
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24.x'
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - name: Deploy preview on Aleph for PRs
        id: deploy
        if: github.event_name == 'pull_request'
        uses: aleph-im/web3-hosting-action@v1.1.4
        with:
          path: js-peer/out
      - name: Deploy preview on Aleph for branch pushes
        id: deploy_branch
        if: github.event_name == 'push' && github.ref != 'refs/heads/main'
        uses: aleph-im/web3-hosting-action@v1.1.4
        with:
          path: js-peer/out
          private-key: ${{ env.ALEPH_PRIVATE_KEY }}
          retention_days: ${{ vars.ALEPH_RETENTION_DAYS }}
      - name: Summarize Aleph preview deployment
        if: (github.event_name == 'pull_request') || (github.event_name == 'push' && github.ref != 'refs/heads/main')
        run: |
          {
            echo '## Aleph Preview Deployment'
            echo
            if [[ -n "${URL:-}" ]]; then
              echo "- URL: ${URL}"
            fi
            if [[ -n "${ITEM_HASH:-}" ]]; then
              echo "- Item hash: ${ITEM_HASH}"
            fi
            if [[ -n "${CID:-}" ]]; then
              echo "- CID: ${CID}"
            fi
            if [[ -z "${URL:-}${ITEM_HASH:-}${CID:-}" ]]; then
              echo '- Preview deployment finished, but no URL/CID output was exposed by the action.'
            fi
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Summarize production ownership
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          {
            echo '## Production Publish Ownership'
            echo
            echo '- The custom domain is intentionally managed by `build-aleph-go-peer-rootfs.yml`.'
            echo '- This `js-peer` workflow only verifies the browser app build on `main` so it does not overwrite `/rootfs/uc-go-peer/latest.json`.'
          } >> "$GITHUB_STEP_SUMMARY"
